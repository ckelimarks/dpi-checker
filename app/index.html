    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Why does Printify show different DPI than my file properties?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your file properties show 'metadata DPI' - just a stored number that doesn't affect print quality. Printify shows 'effective DPI' - the actual print resolution calculated from your pixel dimensions and print size. Both numbers are correct, they just measure different things. What matters for sharp prints is your pixel dimensions relative to print size."
          }
        },
        {
          "@type": "Question",
          "name": "What DPI do I need for print-on-demand?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The industry standard is 300 DPI. For an 8x10 inch print, you need 2400x3000 pixels minimum. For t-shirts (15x18 inch print area), use at least 4500x5400 pixels. While some platforms accept 150 DPI, always design at 300 DPI for flexibility across products and platforms."
          }
        },
        {
          "@type": "Question",
          "name": "Can I convert a 72 DPI image to 300 DPI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not effectively. Changing metadata DPI in Photoshop doesn't add pixels or detail. To truly have 300 DPI at a given print size, you need the correct pixel dimensions from the start. A 1000x1000px image will only print sharply at 300 DPI if the print is 3.33 inches or smaller."
          }
        },
        {
          "@type": "Question",
          "name": "Do SVG files have DPI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, SVG files are vector graphics made of mathematical shapes, not pixels. They can scale to any size without losing quality, making them always print-ready. However, some SVGs contain embedded raster images, which do have resolution limits."
          }
        },
        {
          "@type": "Question",
          "name": "What's the difference between Printify and Printful DPI requirements?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Printify recommends 300 DPI with a 100 MB file size limit. Printful accepts 150 DPI minimum (300 recommended) with a 200 MB limit. Both platforms require RGB color mode and accept PNG and JPG formats. Printful also accepts SVG files."
          }
        }
      ]
    }
    </script>
